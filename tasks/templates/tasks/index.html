<!DOCTYPE html>
<html>
    <head>
        <title>Task List</title>
    </head>
    <body>
        <h1>Task List</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Enter task title" required>
            <button type="submit">Add Task</button>
        </form>
        <ul>
            {% for task in tasks %}
                <li>{{ task.title }}</li>
            {% endfor %}
        </ul>
    </body>

</html>
